<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List App</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h1>Мои задачи</h1>
        
        <div class="todo-input-section">
            <input type="text" id="todoInput" placeholder="Добавить новую задачу..." />
            <select id="prioritySelect">
                <option value="high">🔴 Высокий</option>
                <option value="medium" selected>🟡 Средний</option>
                <option value="low">🟢 Низкий</option>
            </select>
            <input type="date" id="dueDateInput" />
            <button id="addButton">Добавить</button>
        </div>
        
        <div class="todo-filters">
            <button class="filter-btn active" data-filter="all">Все</button>
            <button class="filter-btn" data-filter="active">Активные</button>
            <button class="filter-btn" data-filter="completed">Выполненные</button>
        </div>
        
        <div class="todo-actions">
            <button id="themeToggle">🌙 Тёмная тема</button>
            <button id="clearAll">Очистить всё</button>
        </div>
        
        <ul id="todoList" class="todo-list"></ul>
        
        <div class="todo-stats">
            <span id="taskCount">0</span> задач осталось
        </div>
    </div>
    
    <script src="js/app.js"></script>
</body>
</html>
